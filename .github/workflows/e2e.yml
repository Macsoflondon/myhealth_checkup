name: E2E Visual Regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright (AccreditedProvidersBar)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Start dev server
        run: bun run dev &
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_KEY: placeholder_anon_key

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Wait for dev server
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'

      - name: Run AccreditedProvidersBar visual regression
        run: bunx playwright test accredited-providers-bar.spec.ts

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test-results (traces, screenshots, videos, diff images)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
