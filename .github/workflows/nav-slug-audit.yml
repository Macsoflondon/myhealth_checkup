name: Nav + Sitemap Slug Audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "45 6 * * *"
    - cron: "45 18 * * *"

# Block deployment workflows from starting until this passes.
concurrency:
  group: nav-slug-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: Regenerate sitemap and verify category URLs
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Supabase secrets
        id: secrets-check
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::warning::VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY not configured — skipping nav + sitemap audit"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.secrets-check.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Regenerate sitemap
        if: steps.secrets-check.outputs.skip != 'true'
        run: bunx tsx scripts/generate-sitemap.ts

      - name: Fail if sitemap regeneration produced an uncommitted diff
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          if ! git diff --quiet -- public/sitemap.xml; then
            echo "::error::public/sitemap.xml is out of date — run 'bunx tsx scripts/generate-sitemap.ts' and commit the result."
            git --no-pager diff -- public/sitemap.xml | head -100
            exit 1
          fi

      - name: Audit nav + sitemap category URLs
        if: steps.secrets-check.outputs.skip != 'true'
        run: node scripts/audit-nav-slugs.mjs

      - name: Audit every provider against the live taxonomy (no orphans)
        if: steps.secrets-check.outputs.skip != 'true'
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/audit-provider-taxonomy.mjs

      - name: Summarise on failure
        if: failure()
        run: |
          echo "::error::Audit failed — at least one URL points to a broken/redirected/ambiguous category, or a provider has orphaned products. Fix the taxonomy, sitemap entries, or aliases before merging."
