  <!--
    Static Organization + WebSite JSON-LD.
    Lives in the HTML shell so crawlers (and LLM scrapers) get entity data
    without executing React. Per-page schema is added at runtime via Helmet.
  -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://myhealthcheckup.co.uk/#organization",
        "name": "myhealth checkup",
        "url": "https://myhealthcheckup.co.uk/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://myhealthcheckup.co.uk/og-image.png"
        },
        "description": "UK private health testing comparison marketplace. Compare blood tests, cancer screening, hormone panels, and fertility tests from regulated UK providers.",
        "address": { "@type": "PostalAddress", "addressCountry": "GB" },
        "sameAs": [
          "https://twitter.com/myhealthcheckup"
        ]
      },
      {
        "@type": "WebSite",
        "@id": "https://myhealthcheckup.co.uk/#website",
        "url": "https://myhealthcheckup.co.uk/",
        "name": "myhealth checkup",
        "publisher": { "@id": "https://myhealthcheckup.co.uk/#organization" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://myhealthcheckup.co.uk/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>
  <!--
    Per-route og:title / og:description / twitter:title / twitter:description
    are injected at runtime by react-helmet-async and baked into per-route
    prerendered snapshots. Intentionally omitted here so non-JS social
    crawlers hitting sub-pages don't inherit homepage social-preview text.
  -->
  <meta property="og:title" content="Compare UK Private Blood Tests | myhealth checkup">
  <meta name="twitter:title" content="Compare UK Private Blood Tests | myhealth checkup">
  <meta property="og:description" content="myhealth checkup connects you with trusted UK providers for clinical-grade health tests, making proactive healthcare simple, accessible and reliable.">
  <meta name="twitter:description" content="myhealth checkup connects you with trusted UK providers for clinical-grade health tests, making proactive healthcare simple, accessible and reliable.">
</head>
