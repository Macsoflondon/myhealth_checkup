project_id = "clvuioagsgfadynuvodj"

# LML Nearest Clinics API
# Public access (no JWT) - Users search for clinics BEFORE authentication
# Security: IP rate limiting (10/min), maxPages limit (3), input validation
[functions.lml-nearest]
verify_jwt = false

[functions.geocode-clinic]
verify_jwt = true

# Health AI Analysis API
# Requires authentication - Uses OpenAI API for personalized health recommendations
# Security: JWT verification, verified userId from token, input sanitization
[functions.health-ai-analysis]
verify_jwt = true

# Test Recommendations API
# Public access - Uses Lovable AI to recommend best tests from comparison
# Security: Input validation, rate limiting via AI gateway
[functions.test-recommendations]
verify_jwt = false

# Send Test Notification API
# Requires authentication - Sends test email/SMS notifications
# Security: JWT verification, verified userId from token
[functions.send-test-notification]
verify_jwt = true
